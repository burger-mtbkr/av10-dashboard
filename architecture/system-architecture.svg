80</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="168.4238" x="888.7881" y="1578.8489">config + speaker preset</text></g><!--entity Heos--><g class="entity" data-qualified-name="AVR.Heos" data-source-line="74" id="ent0042"><ellipse cx="769" cy="1532.5569" fill="#F1F1F1" rx="8" ry="8" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="110.2295" x="699.6631" y="1562.552">HEOS CLI :1255</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="138.6738" x="699.6631" y="1578.8489">Quick Select names</text></g><!--entity User--><g class="entity" data-qualified-name="User" data-source-line="22" id="ent0002"><ellipse cx="3223.9951" cy="51.2969" fill="#F1F1F1" rx="8" ry="8" style="stroke:#181818;stroke-width:0.5;"/><path d="M3223.9951,59.2969 L3223.9951,86.2969 M3210.9951,67.2969 L3236.9951,67.2969 M3223.9951,86.2969 L3210.9951,101.2969 M3223.9951,86.2969 L3236.9951,101.2969" fill="none" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="31.9102" x="3208.04" y="115.792">User</text></g><g class="entity" data-qualified-name="GMN90" data-source-line="135" id="ent0091"><path d="M3654.25,800.7669 L3654.25,862.2969 L1571.47,866.2969 L3654.25,870.2969 L3654.25,931.8294 A0,0 0 0 0 3654.25,931.8294 L4021.7495,931.8294 A0,0 0 0 0 4021.7495,931.8294 L4021.7495,810.7669 L4011.7495,800.7669 L3654.25,800.7669 A0,0 0 0 0 3654.25,800.7669" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M4011.7495,800.7669 L4011.7495,810.7669 L4021.7495,810.7669 L4011.7495,800.7669" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="330.751" x="3660.25" y="817.8338">Maintains the only authoritative runtime snapshot.</text><text fill="#000000" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="3660.25" y="832.9666">&#160;</text><text fill="#000000" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="260.0317" x="3660.25" y="848.0994">Speaker preset transitions are guarded:</text><text fill="#000000" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="318.5" x="3660.25" y="863.2322">- current runtime writes presets with telnet SPPR</text><text fill="#000000" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="295.6992" x="3660.25" y="878.365">- pending preset blocks stale speaker layouts</text><text fill="#000000" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="320.3345" x="3660.25" y="893.4978">- burst refresh polls until new layout is confirmed</text><text fill="#000000" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="346.4995" x="3660.25" y="908.6306">- Web Control is used to read preset/config state, not</text><text fill="#000000" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="275.501" x="3668.5146" y="923.7635">to perform the live REST preset write path</text></g><g class="entity" data-qualified-name="GMN93" data-source-line="146" id="ent0094"><path d="M3654.23,1161.5169 L3654.23,1216.9153 L4043.7749,1216.9153 L4043.7749,1171.5169 L4033.7749,1161.5169 L3654.23,1161.5169" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M4033.7749,1161.5169 L4033.7749,1171.5169 L4043.7749,1171.5169 L4033.7749,1161.5169" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="357.2397" x="3660.23" y="1178.5838">This helper targets the Web Control API and is covered</text><text fill="#000000" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="368.5449" x="3660.23" y="1193.7166">by tests, but createApp() and MarantzService do not call</text><text fill="#000000" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="194.8477" x="3660.23" y="1208.8494">it in the current runtime path.</text></g><g class="entity" data-qualified-name="GMN96" data-source-line="152" id="ent0097"><path d="M3663.59,488.3169 L3663.59,558.8481 L4022.4123,558.8481 L4022.4123,498.3169 L4012.4123,488.3169 L3663.59,488.3169" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M4012.4123,488.3169 L4012.4123,498.3169 L4022.4123,498.3169 L4012.4123,488.3169" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="313.0854" x="3669.59" y="505.3838">Optimistic state is kept for volume, mute, input,</text><text fill="#000000" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="309.5498" x="3669.59" y="520.5166">Smart Select, and speaker preset changes until</text><text fill="#000000" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="337.8223" x="3669.59" y="535.6494">matching WebSocket status confirms the change or</text><text fill="#000000" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="132.063" x="3669.59" y="550.7822">the timeout expires.</text></g><!--link User to App--><g class="link" data-entity-1="ent0002" data-entity-2="ent0004" data-link-type="dependency" data-source-line="77" id="lnk43"><path d="M3224,119.5469 C3224,156.1869 3224,204.2569 3224,231.7769" fill="none" id="User-to-App" style="stroke:#2F4F4F;stroke-width:1;"/><polygon fill="#2F4F4F" points="3224,237.7769,3228,228.7769,3224,232.7769,3220,228.7769,3224,237.7769" style="stroke:#2F4F4F;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="162.1191" x="3225" y="162.1638">interacts with dashboard</text></g><!--link App to Hook--><g class="link" data-entity-1="ent0004" data-entity-2="ent0005" data-link-type="dependency" data-source-line="78" id="lnk44"><p